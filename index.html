<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷 | Saolei</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <div class="title-row">
          <div>
            <p class="eyebrow">Saolei</p>
            <h1 id="game-title">扫雷</h1>
          </div>
          <button id="restart-button" class="primary-button" type="button">重新开始</button>
        </div>

        <div class="toolbar" aria-label="游戏控制">
          <label class="control">
            <span>难度</span>
            <select id="difficulty-select">
              <option value="beginner">初级 9×9</option>
              <option value="intermediate">中级 16×16</option>
              <option value="expert">高级 16×30</option>
            </select>
          </label>

          <div class="metric" aria-live="polite">
            <span>剩余地雷</span>
            <strong id="mine-count">10</strong>
          </div>

          <div class="metric" aria-live="polite">
            <span>用时</span>
            <strong id="timer">000</strong>
          </div>

          <button id="flag-mode-button" class="secondary-button" type="button" aria-pressed="false">
            标旗模式
          </button>
        </div>

        <p id="status-message" class="status-message" role="status">选择一个格子开始。</p>

        <div class="board-scroller" aria-label="扫雷棋盘区域">
          <div id="board" class="board" role="grid" aria-label="扫雷棋盘"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.mjs"></script>
  </body>
</html>
